name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write     # create releases + upload assets

jobs:
  build-linux:
    name: linux bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install libvirt + tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: kraftwerk-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  build-macos:
    # Self-hosted on speedwagon — has the Developer ID cert preinstalled
    # in the login keychain, so Tauri's signing finds it automatically.
    # Notarization uses Apple ID + app-specific password from secrets.
    name: macos signed bundle
    runs-on: [self-hosted, macOS, mini]
    env:
      APPLE_SIGNING_IDENTITY: 'Developer ID Application: Nico Bousquet (XJQQCN392F)'
      # Notarization via App Store Connect API key. The .p8 private
      # key lives on the runner at ~/.privatekeys/AuthKey_<KEY_ID>.p8;
      # only the issuer UUID is a repo secret.
      APPLE_API_KEY: Z43Q26MB7Y
      APPLE_API_KEY_PATH: /Users/cali/.privatekeys/AuthKey_Z43Q26MB7Y.p8
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: XJQQCN392F
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: unlock login keychain for codesign
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
      - name: tauri build (universal, sign + notarize)
        # Universal binary: single DMG/.app that runs natively on both
        # Apple Silicon and Intel Macs.
        run: npm run tauri build -- --target universal-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: kraftwerk-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz

  build-windows:
    name: windows bundle (experimental)
    runs-on: windows-latest
    continue-on-error: true   # libvirt on Windows is second-class
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: kraftwerk-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: publish release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
