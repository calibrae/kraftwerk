name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-unit:
    name: rust unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install libvirt + tauri linux deps
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: install libvirt (macos)
        if: matrix.label == 'macos'
        run: |
          brew install libvirt pkg-config

      # libvirt on Windows is not officially supported by upstream.
      # We try pkg-config + a shim; realistically this job is
      # informational only until someone needs first-class Windows
      # client support.
      - name: install libvirt (windows)
        if: matrix.label == 'windows'
        run: |
          echo "libvirt has no first-class Windows build. Job is allowed to fail."
        shell: bash

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test --lib
        working-directory: src-tauri
        run: cargo test --lib --no-fail-fast
        continue-on-error: ${{ matrix.label == 'windows' }}

  frontend-check:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx svelte-kit sync
      - run: npm run check
        continue-on-error: true
      - run: npm run build
        continue-on-error: true   # top-level-await in capsaicin+novnc makes vite bundling finicky

  integration-testhost:
    # Self-hosted runner on speedwagon has SSH access to the testhost
    # hypervisor. Only runs on main pushes so forks can't trigger
    # integration runs against prod infra.
    name: integration tests (testhost)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS, speedwagon]
    steps:
      - uses: actions/checkout@v4
      - name: cargo test --test integration_testhost
        working-directory: src-tauri
        run: cargo test --test integration_testhost -- --test-threads=1
